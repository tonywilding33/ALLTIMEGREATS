<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Time Greats</title>
    <style>
        body { font-family: Arial, sans-serif; background: #111; color: #ddd; margin: 0; }
        
        /* GHeader Downloader */
        .gheader-downloader {
            background: #222; padding: 12px 30px; border-bottom: 2px solid #444;
            display: flex; justify-content: space-between; align-items: center;
        }
        .dl-btn { background: #007bff; color: white; border: none; padding: 6px 12px; cursor: pointer; font-weight: bold; }

        .container { max-width: 850px; margin: 30px auto; }
        
        /* Strict List Format - No Headers */
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #222; }
        .col-num { width: 30px; color: #666; font-family: monospace; }
        .col-artist { font-weight: bold; color: #fff; width: 40%; }
        .col-title { color: #aaa; }
        .col-chart { text-align: right; color: #00ff00; font-weight: bold; width: 10%; }

        /* Footer Credits */
        footer {
            margin-top: 60px; padding: 20px; border-top: 1px solid #333;
            text-align: center; font-size: 12px; color: #555; line-height: 1.6;
        }
        .dev-credit { color: #888; font-weight: bold; }
    </style>
</head>
<body>

    <div class="gheader-downloader">
        <div style="color:#00ff00; font-weight:bold; letter-spacing:1px;">GHEADER DOWNLOADER SYSTEM</div>
        <button class="dl-btn" onclick="window.print()">GENERATE PDF</button>
    </div>

    <div class="container">
        <h1 style="text-align:center; color:#fff; font-weight:300;">All Time Greats</h1>
        <table>
            <tbody id="playlist-body">
                </tbody>
        </table>
    </div>

    <footer>
        <p class="dev-credit">Developer Credits: Broadcast Automation Logic & System Architecture by G-Header Systems</p>
        <p>&copy; 2026 All Time Greats | Proprietary Scheduling Engine v4.0</p>
    </footer>

<script>
    // DATA POOLS (Ensure 'chart' property exists)
    let tierA = [
        { artist: "Queen", title: "Bohemian Rhapsody", chart: "01", gender: "M", year: 1975 },
        { artist: "Madonna", title: "Like A Prayer", chart: "01", gender: "F", year: 1989 }
    ];
    let tierB = [
        { artist: "Michael Jackson", title: "Billie Jean", chart: "01", gender: "M", year: 1982 },
        { artist: "The Beatles", title: "Hey Jude", chart: "01", gender: "M", year: 1968 }
    ];
    let tierC = [
        { artist: "ABBA", title: "Dancing Queen", chart: "01", gender: "F", year: 1976 },
        { artist: "David Bowie", title: "Heroes", chart: "24", gender: "M", year: 1977 }
    ];

    let artistHistory = []; 
    let genderHistory = []; 
    let lastEraWasModern = false;
    const tableBody = document.getElementById('playlist-body');

    for (let i = 0; i < 16; i++) {
        const countNum = (i + 1).toString().padStart(2, '0');
        let pool;

        // Tier Logic
        if (i % 4 === 0) pool = tierA;
        else if (i % 2 === 0) pool = tierB;
        else pool = tierC;

        // Safety check if pool is exhausted
        if (!pool || pool.length === 0) pool = [...tierA, ...tierB, ...tierC];
        if (pool.length === 0) break;

        let pick = null;
        let pickIndex = -1;

        for (let j = 0; j < pool.length; j++) {
            const s = pool[j];
            const artistRepeat = artistHistory.includes(s.artist);
            const genderOverload = genderHistory.length >= 2 && genderHistory.every(g => g === s.gender);
            const isModern = s.year >= 1980;
            const eraShift = (isModern !== lastEraWasModern);

            if (!artistRepeat && !genderOverload) {
                pick = s;
                pickIndex = j;
                if (eraShift) break; 
            }
        }

        // Fallback
        if (!pick) {
            pickIndex = pool.findIndex(s => !artistHistory.includes(s.artist));
            if (pickIndex === -1) pickIndex = 0; 
            pick = pool[pickIndex];
        }

        if (pick) {
            pool.splice(pickIndex, 1);
            artistHistory.push(pick.artist);
            genderHistory.push(pick.gender);
            if (genderHistory.length > 2) genderHistory.shift();
            lastEraWasModern = (pick.year >= 1980);

            // Row construction: NO HEADERS. Number | Artist | Title | Chart Pos
            tableBody.innerHTML += `
                <tr>
                    <td class="col-num">${countNum}</td>
                    <td class="col-artist">${pick.artist}</td>
                    <td class="col-title">${pick.title}</td>
                    <td class="col-chart">${pick.chart}</td>
                </tr>
            `;
        }
    }
</script>
</body>
</html>
