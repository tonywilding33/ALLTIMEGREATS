<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>National Request Playlist Generator</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f4f4f9; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        button { background: #2c3e50; color: white; border: none; padding: 15px 30px; border-radius: 4px; cursor: pointer; font-size: 1.1em; width: 100%; font-weight: bold; }
        pre { background: #1a252f; color: #ecf0f1; padding: 25px; border-radius: 4px; font-size: 1.1em; white-space: pre-wrap; margin-top: 20px; line-height: 1.5; border-left: 5px solid #3498db; }
        footer { margin-top: 30px; font-size: 0.85em; color: #7f8c8d; text-align: center; border-top: 1px solid #ddd; padding-top: 15px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="box">
        <button id="genBtn" onclick="generatePlaylist()" disabled>LOADING NHRRC DATABASE...</button>
        
        <div id="outputArea" style="display:none;">
            <pre id="playlistDisplay"></pre>
        </div>

        <footer>
            Credits: Developer Tony Wilding<br>
            Original National Request Chart Data (Top 500) Contributed by Mark W Snowdon
        </footer>
    </div>

    <script>
        // Using relative path to ensure it finds the file in your GitHub Root
        const SHEET_URL = 'NHRRC%20Data.csv';
        let libraryData = [];

        async function fetchLibrary() {
            try {
                const response = await fetch(SHEET_URL + "?cb=" + Date.now());
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/).slice(1);
                
                libraryData = lines.map(line => {
                    // Split by comma but preserve text inside quotes to avoid cutting off titles
                    let cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 10) {
                        return {
                            artist: cols[1].replace(/"/g, "").trim(),
                            title: cols[2].replace(/"/g, "").trim(),
                            cat: cols[3].trim().toUpperCase(),
                            year: parseInt(cols[8].trim()) || 1900,
                            gender: cols[9].trim().toUpperCase()
                        };
                    }
                    return null;
                }).filter(row => row !== null && row.artist !== "");
                
                if (libraryData.length > 0) {
                    document.getElementById('genBtn').innerText = "GENERATE FULL PLAYLIST";
                    document.getElementById('genBtn').disabled = false;
                } else {
                    document.getElementById('genBtn').innerText = "CSV DATA EMPTY - CHECK ROOT FILE";
                }
            } catch (err) {
                document.getElementById('genBtn').innerText = "FILE NOT FOUND - ENSURE CSV IS IN ROOT";
            }
        }

        function generatePlaylist() {
            // Separate Tiers
            let tierA = libraryData.filter(r => r.cat === 'A');
            let tierB = libraryData.filter(r => r.cat === 'B');
            let tierC = libraryData.filter(r => r.cat === 'C');

            let artistHistory = []; 
            let genderHistory = []; 
            let lastEraWasModern = false;
            let output = "--- NATIONAL REQUEST OFFICIAL PLAYLIST ---\n\n";

            // YOUR EXACT LOGIC BLOCK
            for (let i = 0; i < 16; i++) {
                const countNum = (i + 1).toString().padStart(2, '0');
                let pool;
                let tierLabel;

                if (i % 4 === 0) {
                    pool = tierA; tierLabel = "Power Gold";
                } else if (i % 2 === 0) {
                    pool = tierB; tierLabel = "Heavy";
                } else {
                    pool = tierC; tierLabel = "Medium";
                }
                
                let pick = null;
                let pickIndex = -1;

                for (let j = 0; j < pool.length; j++) {
                    const s = pool[j];
                    const artistRepeat = artistHistory.includes(s.artist);
                    const genderOverload = genderHistory.length >= 2 && genderHistory.every(g => g === s.gender);
                    const isModern = s.year >= 1990;
                    const eraShift = (isModern !== lastEraWasModern);

                    if (!artistRepeat && !genderOverload) {
                        pick = s;
                        pickIndex = j;
                        if (eraShift) break; 
                    }
                }

                if (!pick && pool.length > 0) {
                    pickIndex = pool.findIndex(s => !artistHistory.includes(s.artist));
                    if (pickIndex === -1) pickIndex = 0;
                    pick = pool[pickIndex];
                }

                if (pick) {
                    pool.splice(pickIndex, 1);
                    artistHistory.push(pick.artist);
                    genderHistory.push(pick.gender);
                    if (genderHistory.length > 2) genderHistory.shift();
                    lastEraWasModern = (pick.year >= 1990);

                    // DISPLAY FORMAT: [Tier] Artist Name - Song Title (No abbreviations)
                    output += `${countNum}. [${tierLabel}] ${pick.artist} - ${pick.title}\n`;
                }
            }

            document.getElementById('playlistDisplay').innerText = output;
            document.getElementById('outputArea').style.display = 'block';
        }

        fetchLibrary();
    </script>
</body>
</html>
