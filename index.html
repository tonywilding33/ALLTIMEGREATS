<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Radio - All Time Greats</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; }
        .card { max-width: 600px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #004a99; color: white; padding: 30px 20px; text-align: center; }
        .slot { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #eee; }
        .num { width: 35px; font-weight: bold; color: #004a99; font-size: 1.1em; opacity: 0.6; }
        .details { flex-grow: 1; }
        .artist { font-weight: bold; color: #222; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
        .title { color: #555; font-size: 0.95em; }
        .tag { font-size: 0.65em; font-weight: bold; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; margin-left: 10px; min-width: 80px; text-align: center; }
        .power { background: #ffd700; color: #000; border: 1px solid #b8860b; }
        .classic { background: #e1f0ff; color: #004a99; }
        .footer { background: #f8f9fa; color: #555; padding: 20px; text-align: center; font-size: 0.85em; border-top: 1px solid #eee; line-height: 1.6; }
        
        .download-btn { 
            display: inline-block; 
            margin-top: 15px; 
            padding: 10px 20px; 
            background: #ffffff; 
            color: #004a99; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 0.85em;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        .download-btn:hover { background: #e1f0ff; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1 style="margin:0; font-size: 1.8em; letter-spacing: 2px;">ALL-TIME GREATS</h1>
        <button class="download-btn" onclick="downloadPlaylist()">📥 Download Playlist (.txt)</button>
    </div>
    
    <div id="main-list">Loading All-Time Greats...</div>

    <div class="footer">
        <strong>Developer:</strong> Tony Wilding<br>
        From the National Hospital Radio Request Charts (Top 40) since 2004, curated by <strong>Mark W Snowdon</strong>
    </div>
</div>

<script>
    const csvUrl = 'https://raw.githubusercontent.com/tonywilding33/ALLTIMEGREATS/main/Scored_Hospital_Radio_Data.csv?nocache=' + Date.now();
    let currentPlaylistData = [];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    async function start() {
        try {
            const res = await fetch(csvUrl);
            const text = await res.text();
            const rows = text.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
            
            let allSongs = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { 
                    artist: c[0].replace(/"/g, "").trim(), 
                    title: c[1].replace(/"/g, "").trim(),
                    score: parseInt(c[24]) || 0,
                    peak: parseInt(c[27]) || 99,
                    gender: (c[28] || "M").trim().toUpperCase(),
                    year: parseInt(c[29]) || 2000
                };
            });

            // TIER LOGIC (Horizontal Shift Tiers)
            let tierA = allSongs.filter(s => s.peak <= 5 && s.score > 500); // Power Gold
            let tierB = allSongs.filter(s => (s.peak > 5 && s.peak <= 20) || (s.score >= 250 && s.score <= 500)); // Heavy
            let tierC = allSongs.filter(s => !tierA.includes(s) && !tierB.includes(s)); // Medium/Classic

            shuffleArray(tierA);
            shuffleArray(tierB);
            shuffleArray(tierC);

            let artistHistory = [];
            let genderHistory = [];
            let lastYear = 0;
            let html = "";
            currentPlaylistData = []; 

            for (let i = 0; i < 16; i++) {
                const countNum = (i + 1).toString().padStart(2, '0');
                
                // Select pool based on rotation pattern (Every 4th is a Tier A Power hit)
                let isPower = (i % 4 === 0);
                let pool = isPower ? tierA : (i % 2 === 0 ? tierB : tierC);
                
                let pick = null;
                let pickIndex = -1;

                for (let j = 0; j < pool.length; j++) {
                    const song = pool[j];
                    
                    // Logic: Avoid same artist in last 5, same gender > 2 times, and shift Eras
                    const artistMatch = artistHistory.includes(song.artist);
                    const genderMatch = genderHistory.filter(g => g === song.gender).length >= 2;
                    const eraShift = (lastYear < 1990 && song.year < 1990) || (lastYear >= 1990 && song.year >= 1990);

                    if (!artistMatch && !genderMatch) {
                        pick = song;
                        pickIndex = j;
                        // Preference for era shifting, but don't break the loop if not perfect
                        if (!eraShift) break; 
                    }
                }

                if (!pick) {
                    pickIndex = 0;
                    pick = pool[pickIndex];
                }

                pool.splice(pickIndex, 1);

                // Update Histories for Horizontal Shifting
                artistHistory.push(pick.artist);
                if (artistHistory.length > 5) artistHistory.shift();
                
                genderHistory.push(pick.gender);
                if (genderHistory.length > 2) genderHistory.shift();

                lastYear = pick.year;

                currentPlaylistData.push({
                    id: countNum,
                    artist: pick.artist,
                    title: pick.title,
                    type: isPower ? 'POWER' : 'CLASSIC'
                });

                html += `<div class="slot">
                    <span class="num">${countNum}</span>
                    <div class="details">
                        <span class="artist">${pick.artist}</span>
                        <span class="title">${pick.title}</span>
                    </div>
                    <span class="tag ${isPower ? 'power' : 'classic'}">${isPower ? '⚡ Power' : 'Classic'}</span>
                </div>`;
            }
            document.getElementById('main-list').innerHTML = html;
        } catch (e) {
            console.error(e);
            document.getElementById('main-list').innerHTML = "Error loading data. Check console for details.";
        }
    }

    function downloadPlaylist() {
        if (currentPlaylistData.length === 0) return;
        let content = `ALL-TIME GREATS PLAYLIST\r\n`;
        content += `-------------------------------------------\r\n`;
        currentPlaylistData.forEach(song => {
            content += `${song.id}. ${song.artist.toUpperCase()} - ${song.title} [${song.type}]\r\n`;
        });
        content += `-------------------------------------------\r\n`;
        content += `From the National Hospital Radio Request Charts (Top 40) since 2004, curated by Mark W Snowdon\r\n`;
        content += `System Developer: Tony Wilding`;
        
        const blob = new Blob([content], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `All_Time_Greats_Playlist.txt`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
    }

    start();
</script>
</body>
</html>
