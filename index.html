<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ALL TIME GREATS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; background: #f0f2f5; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-top: 6px solid #1a252f; }
        h2 { color: #1a252f; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        pre { background: #1a252f; color: #f8f9f9; padding: 25px; border-radius: 6px; font-size: 0.9em; white-space: pre-wrap; border-left: 5px solid #3498db; overflow-x: auto; margin-top: 20px; }
        .controls { text-align: center; margin-top: 20px; }
        button { background: #2980b9; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        footer { margin-top: 40px; font-size: 0.85em; color: #7f8c8d; text-align: center; border-top: 1px solid #ddd; padding-top: 15px; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="box">
        <h2>ALL TIME GREATS</h2>
        
        <div id="outputArea">
            <pre id="playlistDisplay"></pre>
            <div class="controls">
                <button onclick="downloadTxt()">Download Playlist (.txt)</button>
            </div>
        </div>

        <footer>
            Credits: Developer Tony Wilding<br>
            Original National Request Chart Data (Top 500) Contributed by Mark W Snowdon
        </footer>
    </div>

    <script>
        const SHEET_URL = 'https://raw.githubusercontent.com/tonywilding33/NHRRC/main/NHRRC%20Data.csv';
        let libraryData = [];

        async function fetchLibrary() {
            try {
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/).slice(1);
                
                libraryData = lines.map(line => {
                    let cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 10) {
                        return {
                            tyPos: cols[0]?.trim(),
                            artist: cols[1]?.trim(),
                            title: cols[2]?.trim(),
                            cat: cols[3]?.trim().toUpperCase(),
                            year: parseInt(cols[8]?.trim()) || 0,
                            gender: cols[9]?.trim()
                        };
                    }
                    return null;
                }).filter(row => row !== null && row.artist);
                
                generatePlaylist();
            } catch (err) {
                document.getElementById('playlistDisplay').innerText = "Data Error.";
            }
        }

        function generatePlaylist() {
            const hourPattern = ["A", "B", "A", "C"]; 
            let playlist = [];
            let artistHistory = []; 
            let genderHistory = []; 
            
            for (let i = 0; i < 16; i++) {
                let targetCat = hourPattern[i % hourPattern.length];
                let pool = libraryData.filter(r => {
                    const isCat = r.cat === targetCat;
                    const artistRepeat = artistHistory.includes(r.artist);
                    const genderOverload = genderHistory.length >= 2 && 
                                           genderHistory[genderHistory.length-1] === r.gender && 
                                           genderHistory[genderHistory.length-2] === r.gender;
                    return isCat && !artistRepeat && !genderOverload;
                });

                if (pool.length === 0) pool = libraryData.filter(r => r.cat === targetCat);
                if (pool.length === 0) pool = libraryData; // Total fallback to keep it from being empty

                let pick = pool[Math.floor(Math.random() * pool.length)];

                if (pick) {
                    playlist.push(pick);
                    artistHistory.push(pick.artist);
                    genderHistory.push(pick.gender);
                    if (genderHistory.length > 2) genderHistory.shift();
                }
            }
            display(playlist);
        }

        function display(list) {
            let out = "";
            list.forEach((s, index) => {
                let slotNum = (index + 1).toString().padStart(2, '0');
                out += `${slotNum} | ${s.artist.toUpperCase()} - ${s.title}\n`;
                out += `     TY POS: ${s.tyPos} | CAT: ${s.cat} | YEAR: ${s.year} | GENDER: ${s.gender}\n`;
                out += `-----------------------------------------\n`;
            });
            document.getElementById('playlistDisplay').innerText = out;
        }

        function downloadTxt() {
            const content = document.getElementById('playlistDisplay').innerText;
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "AllTimeGreats_Playlist.txt";
            a.click();
        }

        fetchLibrary();
    </script>
</body>
</html>
