<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Radio Scheduler V1.1</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { max-width: 600px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #004a99; color: white; padding: 20px; text-align: center; }
        .slot { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .time { width: 60px; font-weight: bold; color: #004a99; }
        .artist { font-weight: bold; margin-right: 5px; }
        .tag { margin-left: auto; font-size: 0.7em; background: #e1f0ff; padding: 3px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header"><h2 style="margin:0;">10:00 AM - 11:00 AM</h2></div>
    <div id="main-list">Loading 16 unique songs...</div>
</div>

<script>
    // The "Date.now()" at the end forces GitHub to send the freshest CSV every single time
    const csvUrl = 'https://raw.githubusercontent.com/tonywilding33/ALLTIMEGREATS/main/Scored_Hospital_Radio_Data.csv?nocache=' + Date.now();

    async function start() {
        try {
            const res = await fetch(csvUrl);
            const text = await res.text();
            const rows = text.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
            
            let songs = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { 
                    artist: c[0].replace(/"/g, "").trim(), 
                    title: c[1].replace(/"/g, "").trim(),
                    score: parseInt(c[c.length-4]) || 0 
                };
            });

            const tierA = songs.filter(s => s.score > 600);
            const tierC = songs.filter(s => s.score <= 600);

            let artistHistory = [];
            let html = "";
            const dayNum = new Date().getDay();

            // FORCE 16 SLOTS (4 per quarter hour)
            for (let i = 0; i < 16; i++) {
                const quarter = Math.floor(i / 4);
                const time = `10:${(quarter * 15).toString().padStart(2, '0')}`;
                
                // Pick Gold for the start of every quarter, otherwise Classic
                let pool = (i % 4 === 0) ? tierA : tierC;
                let type = (i % 4 === 0) ? "GOLD" : "CLASSIC";
                
                let baseIdx = (dayNum * 37 + i) % pool.length;
                let pick = null;

                // Loop through the pool until we find a non-repeated artist
                for (let offset = 0; offset < pool.length; offset++) {
                    let candidate = pool[(baseIdx + offset) % pool.length];
                    if (!artistHistory.includes(candidate.artist)) {
                        pick = candidate;
                        break;
                    }
                }
                
                // If the library is too small to avoid a repeat, just take the base pick
                if (!pick) pick = pool[baseIdx];

                artistHistory.push(pick.artist);
                // Only allow an artist to repeat after 10 other songs have played
                if (artistHistory.length > 10) artistHistory.shift();

                html += `<div class="slot">
                    <span class="time">${time}</span>
                    <span class="artist">${pick.artist}</span>
                    <span class="title">- ${pick.title}</span>
                    <span class="tag">${type}</span>
                </div>`;
            }
            document.getElementById('main-list').innerHTML = html;
        } catch (e) {
            document.getElementById('main-list').innerHTML = "Error: " + e.message;
        }
    }
    start();
</script>
</body>
</html>
