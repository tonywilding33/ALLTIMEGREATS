<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Radio - All Time Greats</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; }
        .card { max-width: 600px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #004a99; color: white; padding: 20px; text-align: center; position: relative; }
        .slot { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .num { width: 40px; font-weight: bold; color: #004a99; font-size: 1.1em; opacity: 0.7; }
        .details { flex-grow: 1; }
        .artist { font-weight: bold; color: #222; display: block; }
        .title { color: #666; font-size: 0.9em; }
        .tag { font-size: 0.65em; font-weight: bold; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; margin-left: 10px; min-width: 80px; text-align: center; }
        .power { background: #ffd700; color: #000; border: 1px solid #b8860b; }
        .classic { background: #e1f0ff; color: #004a99; }
        .footer { background: #f8f9fa; color: #555; padding: 20px; text-align: center; font-size: 0.8em; border-top: 1px solid #eee; line-height: 1.5; }
        
        .download-btn { 
            display: inline-block; 
            margin-top: 15px; 
            padding: 8px 15px; 
            background: #ffffff; 
            color: #004a99; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold; 
            font-size: 0.85em;
            cursor: pointer;
            border: none;
            transition: background 0.3s;
        }
        .download-btn:hover { background: #e1f0ff; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="margin:0;">📻 All-Time Greats Hourly List</h2>
        <div id="day-info" style="opacity:0.8; font-size: 0.9em; margin-top: 5px;"></div>
        <button class="download-btn" onclick="downloadPlaylist()">📥 Download Text List</button>
    </div>
    
    <div id="main-list">Loading rotation...</div>

    <div class="footer">
        <strong>Developer:</strong> Tony Wilding | <strong>Research:</strong> Mark W Snowdon<br>
        <span style="color: #7f8c8d; font-style: italic;">Powered by the National Hospital Radio Request Archives</span>
    </div>
</div>

<script>
    const csvUrl = 'https://raw.githubusercontent.com/tonywilding33/ALLTIMEGREATS/main/Scored_Hospital_Radio_Data.csv?nocache=' + Date.now();
    let currentPlaylistData = [];

    async function start() {
        try {
            const res = await fetch(csvUrl);
            const text = await res.text();
            const rows = text.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
            
            let allSongs = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { 
                    artist: c[0].replace(/"/g, "").trim(), 
                    title: c[1].replace(/"/g, "").trim(),
                    score: parseInt(c[c.length-4]) || 0 
                };
            });

            allSongs.sort((a, b) => b.score - a.score);
            const powerCount = Math.floor(allSongs.length * 0.15);
            const tierA = allSongs.slice(0, powerCount);
            const tierC = allSongs.slice(powerCount);

            let artistHistory = [];
            let html = "";
            currentPlaylistData = []; 
            
            const today = new Date();
            const dayNum = today.getDay();
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            document.getElementById('day-info').innerText = days[dayNum] + " Rotation";

            for (let i = 0; i < 16; i++) {
                const countNum = (i + 1).toString().padStart(2, '0');
                
                let isPower = (i % 4 === 0);
                let pool = isPower ? tierA : tierC;
                let baseIdx = (dayNum * 41 + i) % pool.length;
                let pick = null;

                for (let offset = 0; offset < Math.min(pool.length, 50); offset++) {
                    let candidate = pool[(baseIdx + offset) % pool.length];
                    if (!artistHistory.includes(candidate.artist)) {
                        pick = candidate;
                        break;
                    }
                }
                
                if (!pick) pick = pool[baseIdx];

                artistHistory.push(pick.artist);
                if (artistHistory.length > 12) artistHistory.shift();

                currentPlaylistData.push({
                    id: countNum,
                    artist: pick.artist,
                    title: pick.title,
                    type: isPower ? 'POWER' : 'GOLD'
                });

                html += `<div class="slot">
                    <span class="num">${countNum}</span>
                    <div class="details">
                        <span class="artist">${pick.artist}</span>
                        <span class="title">${pick.title}</span>
                    </div>
                    <span class="tag ${isPower ? 'power' : 'classic'}">${isPower ? '⚡ Power Gold' : 'Classic'}</span>
                </div>`;
            }
            document.getElementById('main-list').innerHTML = html;
        } catch (e) {
            document.getElementById('main-list').innerHTML = "Error: " + e.message;
        }
    }

    function downloadPlaylist() {
        if (currentPlaylistData.length === 0) return;
        let content = `HOSPITAL RADIO PLAYLIST - ${new Date().toLocaleDateString()}\r\n`;
        content += `-------------------------------------------\r\n`;
        currentPlaylistData.forEach(song => {
            content += `${song.id} | ${song.artist.toUpperCase()} - ${song.title} [${song.type}]\r\n`;
        });
        content += `-------------------------------------------\r\n`;
        const blob = new Blob([content], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Playlist_List.txt`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
    }

    start();
</script>
</body>
</html>
