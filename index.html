<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Time Greats | Music Scheduler</title>
    <style>
        :root {
            --power-gold: #ff4b2b;
            --heavy: #ffb400;
            --medium: #2b95ff;
            --bg-dark: #121212;
            --panel-dark: #1e1e1e;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-dark); color: #e0e0e0; margin: 0; padding: 0; }
        
        /* GHeader Downloader Style */
        .gheader-downloader {
            background: #252525;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .btn-download {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-download:hover { background: #45a049; }

        .main-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        h1.brand-title { text-align: center; color: #fff; margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }

        table { width: 100%; border-collapse: collapse; background: var(--panel-dark); border-radius: 8px; overflow: hidden; }
        th { background: #333; padding: 15px; text-align: left; font-size: 12px; color: #999; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #2a2a2a; }
        
        .tier-badge { padding: 4px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; color: #fff; }
        .tier-a .tier-badge { background: var(--power-gold); }
        .tier-b .tier-badge { background: var(--heavy); color: #000; }
        .tier-c .tier-badge { background: var(--medium); }

        /* Footer Credits */
        footer {
            margin-top: 50px;
            padding: 30px;
            background: #0a0a0a;
            text-align: center;
            border-top: 1px solid #222;
            color: #666;
            font-size: 13px;
        }
        footer span { color: #888; font-weight: bold; }
    </style>
</head>

    <div class="main-container">

        </table>
    </div>

    <footer>

    </footer>
