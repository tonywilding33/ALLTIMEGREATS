<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>National Request Radio Scheduler</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 20px auto; line-height: 1.6; padding: 20px; background: #f0f2f5; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-top: 6px solid #1a252f; }
        .status { font-size: 0.9em; color: #546e7a; margin-bottom: 20px; padding: 12px; background: #eef1f2; border-radius: 6px; border: 1px solid #1a252f; font-weight: bold; }
        h2 { color: #1a252f; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { background: #1a252f; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #34495e; }
        button:disabled { background: #bdc3c7; }
        pre { background: #1a252f; color: #f8f9f9; padding: 25px; border-radius: 6px; font-size: 0.9em; white-space: pre-wrap; border-left: 5px solid #3498db; overflow-x: auto; }
        footer { margin-top: 40px; font-size: 0.85em; color: #7f8c8d; text-align: center; border-top: 1px solid #ddd; padding-top: 15px; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="box">
        <h2>National Request Radio Scheduler</h2>
        <div id="loadStatus" class="status">Initializing System...</div>
        
        <div class="controls">
            <button id="genBtn" onclick="generateAdvancedPlaylist()" disabled>Generate 20-Min Shift Schedule</button>
        </div>
        
        <div id="outputArea" style="display:none;">
            <h3>Master Air-Log</h3>
            <pre id="playlistDisplay"></pre>
            <button style="background:#2980b9;" onclick="downloadTxt()">Export Schedule (.txt)</button>
        </div>

        <footer>
            Credits: Developer Tony Wilding<br>
            Original National Request Chart Data (Top 500) Contributed by Mark W Snowdon
        </footer>
    </div>

    <script>
        const SHEET_URL = 'https://raw.githubusercontent.com/tonywilding33/NHRRC/main/NHRRC%20Data.csv';
        let libraryData = [];

        function fixArtist(name) {
            if (!name) return "Unknown Artist";
            let n = name.trim();
            const needsThe = ["Beatles", "Carpenters", "Animals", "Kinks", "Temptations", "Killers", "Pogues", "Righteous Brothers"];
            if (needsThe.includes(n)) return "The " + n;
            return n;
        }

        async function fetchLibrary() {
            try {
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/).slice(1);
                
                libraryData = lines.map(line => {
                    let cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 10) {
                        return {
                            tyPos: cols[0]?.trim(),
                            artist: fixArtist(cols[1]),
                            title: cols[2]?.trim(),
                            cat: cols[3]?.trim().toUpperCase(),
                            score: parseFloat(cols[6]?.trim()) || 0,
                            tempo: cols[7]?.trim(),
                            year: parseInt(cols[8]?.trim()) || 0,
                            gender: cols[9]?.trim()
                        };
                    }
                    return null;
                }).filter(row => row !== null && row.artist !== "Unknown Artist");
                
                document.getElementById('loadStatus').innerHTML = `SYSTEM READY: ${libraryData.length} Tracks Loaded from Root.`;
                document.getElementById('genBtn').disabled = false;
            } catch (err) {
                document.getElementById('loadStatus').innerHTML = "ERROR: Could not connect to CSV in Root.";
                console.error(err);
            }
        }

        function generateAdvancedPlaylist() {
            // CATEGORY ROTATION
            const hourPattern = ["A", "B", "A", "C"]; 
            let playlist = [];
            
            // TRACKING HISTORY
            let artistHistory = []; 
            let genderHistory = []; 
            let lastEraWasModern = false;
            
            let currentTime = new Date();
            currentTime.setMinutes(0, 0, 0);

            // CLOCK: Generate 20 slots
            for (let i = 0; i < 20; i++) {
                let targetCat = hourPattern[i % hourPattern.length];
                
                // 1. FILTER POOL BY CATEGORY
                let pool = libraryData.filter(r => r.cat === targetCat);
                
                let pick = null;
                let pickIndex = -1;

                // 2. SELECTION LOOP WITH RULES
                for (let j = 0; j < pool.length; j++) {
                    const s = pool[j];
                    
                    // Rule: Hard Artist Lock
                    const artistRepeat = artistHistory.includes(s.artist);
                    
                    // Rule: Gender Overload (Max 2 same in a row)
                    const genderOverload = genderHistory.length >= 2 && 
                                           genderHistory[genderHistory.length - 1] === s.gender && 
                                           genderHistory[genderHistory.length - 2] === s.gender;
                    
                    // Rule: Era Alternation (Modern is 1980+)
                    const isModern = s.year >= 1980;
                    const eraShift = (isModern !== lastEraWasModern);

                    if (!artistRepeat && !genderOverload) {
                        pick = s;
                        pickIndex = j;
                        // If it matches Category + Artist + Gender + Era, take it immediately
                        if (eraShift) break; 
                    }
                }

                // 3. EMERGENCY FALLBACK (If strict rules yield nothing)
                if (!pick) {
                    pick = pool.find(s => !artistHistory.includes(s.artist)) || pool[0];
                }

                if (pick) {
                    let timeStr = currentTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    playlist.push({ airTime: timeStr, ...pick });

                    // 4. UPDATE HISTORY
                    artistHistory.push(pick.artist);
                    genderHistory.push(pick.gender);
                    lastEraWasModern = (pick.year >= 1980);
                    
                    currentTime.setMinutes(currentTime.getMinutes() + 20);
                }
            }
            display(playlist);
        }

        function display(list) {
            let out = "--- NHRRC ADVANCED RADIO SCHEDULE ---\n";
            out += "Generated: " + new Date().toLocaleString() + "\n";
            out += "Shift Interval: 20 Minutes\n";
            out += "--------------------------------------\n\n";
            
            list.forEach((s, index) => {
                out += `[${s.airTime}] SLOT ${index + 1}\n`;
                out += `ARTIST: ${s.artist}\n`;
                out += `SONG:   ${s.title}\n`;
                out += `DATA:   [Cat: ${s.cat}] [Year: ${s.year}] [Gen: ${s.gender}] [Tempo: ${s.tempo}] [Score: ${s.score}]\n`;
                out += `--------------------------------------\n`;
            });
            
            document.getElementById('playlistDisplay').innerText = out;
            document.getElementById('outputArea').style.display = 'block';
        }

        function downloadTxt() {
            const content = document.getElementById('playlistDisplay').innerText;
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "NHRRC_Schedule.txt";
            a.click();
        }

        fetchLibrary();
    </script>
</body>
</html>
