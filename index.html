<script>
    const csvUrl = 'https://raw.githubusercontent.com/tonywilding33/ALLTIMEGREATS/main/Scored_Hospital_Radio_Data.csv?nocache=' + Date.now();
    let currentPlaylistData = [];

    // Helper function to shuffle an array (Fisher-Yates)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    async function start() {
        try {
            const res = await fetch(csvUrl);
            const text = await res.text();
            const rows = text.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
            
            let allSongs = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                let artist = c[0].replace(/"/g, "").trim();
                let title = c[1].replace(/"/g, "").trim();

                if (artist.toLowerCase().includes("stevie wonder") && title.toLowerCase().includes("i just called")) {
                    title = "I Just Called to Say I Love You";
                }

                return { 
                    artist: artist, 
                    title: title,
                    score: parseInt(c[c.length-4]) || 0 
                };
            });

            // Sort by score to define tiers
            allSongs.sort((a, b) => b.score - a.score);
            
            const powerLimit = Math.floor(allSongs.length * 0.15);
            // We shuffle the pools so the selection is random every time
            const tierA = shuffle(allSongs.slice(0, powerLimit));
            const tierC = shuffle(allSongs.slice(powerLimit));

            let artistHistory = [];
            let html = "";
            currentPlaylistData = []; 

            for (let i = 0; i < 16; i++) {
                const countNum = (i + 1).toString().padStart(2, '0');
                let isPower = (i % 4 === 0);
                let pool = isPower ? tierA : tierC;
                
                let pick = null;
                let pickIndex = -1;

                // Look for a song where the artist hasn't played recently
                for (let j = 0; j < pool.length; j++) {
                    if (!artistHistory.includes(pool[j].artist)) {
                        pick = pool[j];
                        pickIndex = j;
                        break;
                    }
                }
                
                // Fallback if no unique artist found
                if (!pick) {
                    pickIndex = 0;
                    pick = pool[pickIndex];
                }

                // Remove the picked song from the pool so it isn't picked again in this session
                pool.splice(pickIndex, 1);

                artistHistory.push(pick.artist);
                if (artistHistory.length > 8) artistHistory.shift();

                currentPlaylistData.push({
                    id: countNum,
                    artist: pick.artist,
                    title: pick.title,
                    type: isPower ? 'POWER' : 'CLASSIC'
                });

                html += `<div class="slot">
                    <span class="num">${countNum}</span>
                    <div class="details">
                        <span class="artist">${pick.artist}</span>
                        <span class="title">${pick.title}</span>
                    </div>
                    <span class="tag ${isPower ? 'power' : 'classic'}">${isPower ? '⚡ Power' : 'Classic'}</span>
                </div>`;
            }
            document.getElementById('main-list').innerHTML = html;
        } catch (e) {
            console.error(e);
            document.getElementById('main-list').innerHTML = "Error loading data.";
        }
    }

    // ... (Keep your downloadPlaylist function exactly as it was)
    
    start();
</script>
