<script>
    const csvUrl = 'https://raw.githubusercontent.com/tonywilding33/ALLTIMEGREATS/main/Scored_Hospital_Radio_Data.csv' + '?t=' + new Date().getTime();

    async function generateFullHour() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1).filter(r => r.trim() !== "");

            let tierA = []; // Power Gold
            let tierC = []; // Classics

            rows.forEach(line => {
                const cols = line.split(',');
                if (cols.length < 2) return;
                const score = parseInt(cols[cols.length - 4]) || 0;
                const song = { artist: cols[0].trim(), title: cols[1].trim() };
                if (score > 600) tierA.push(song); else tierC.push(song);
            });

            const dayNum = new Date().getDay(); 
            let html = "";
            let recentlyPlayedArtists = []; // This tracks the last 5 artists

            for (let q = 0; q < 4; q++) {
                const timeStr = "10:" + (q * 15 === 0 ? "00" : q * 15);
                html += `<div class="quarter-block"><span class="quarter-header">${timeStr} Section</span>`;

                for (let slot = 0; slot < 4; slot++) {
                    let song;
                    let type = (slot === 0) ? "Power Gold" : "Classic";
                    let pool = (slot === 0) ? tierA : tierC;
                    
                    // Math + Collision Detection
                    let baseIdx = (dayNum * 17 + q * 4 + slot) % pool.length;
                    let attempts = 0;
                    
                    // Look for a song where the artist isn't in the "Recently Played" list
                    while (attempts < 10) {
                        let checkIdx = (baseIdx + attempts) % pool.length;
                        let candidate = pool[checkIdx];
                        
                        if (!recentlyPlayedArtists.includes(candidate.artist)) {
                            song = candidate;
                            break;
                        }
                        attempts++;
                    }
                    
                    // Fallback if we can't find a unique artist (rare)
                    if (!song) song = pool[baseIdx];

                    // Add to buffer and keep it to last 5 songs
                    recentlyPlayedArtists.push(song.artist);
                    if (recentlyPlayedArtists.length > 5) recentlyPlayedArtists.shift();

                    html += `
                    <div class="song-row">
                        <span class="artist">${song.artist}</span>
                        <span class="title">- ${song.title}</span>
                        <span class="tag">${type}</span>
                    </div>`;
                }
                html += `</div>`;
            }
            document.getElementById('playlist-container').innerHTML = html;

        } catch (error) {
            document.getElementById('playlist-container').innerHTML = "Error loading music database.";
        }
    }

    generateFullHour();
</script>
