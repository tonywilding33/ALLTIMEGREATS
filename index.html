<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Radio - 1 Hour Playlist</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .card { max-width: 600px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { background: #004a99; color: white; padding: 20px; text-align: center; border-radius: 12px 12px 0 0; }
        .content { padding: 20px; }
        .slot { border-left: 5px solid #3498db; background: #f8f9fa; margin-bottom: 8px; padding: 12px; border-radius: 0 8px 8px 0; display: flex; align-items: center; }
        .time { font-weight: bold; color: #004a99; width: 60px; font-size: 0.9em; }
        .song-details { flex-grow: 1; }
        .artist { font-weight: bold; display: block; }
        .title { font-size: 0.95em; color: #555; }
        .tag { font-size: 0.7em; background: #e1f0ff; color: #004a99; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; margin-left: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="margin:0;">📻 10:00 - 11:00 AM Hour</h2>
        <div id="day-label" style="opacity:0.8;"></div>
    </div>
    <div class="content" id="playlist">Generating fresh rotation...</div>
</div>

<script>
    const csvUrl = 'https://raw.githubusercontent.com/tonywilding33/ALLTIMEGREATS/main/Scored_Hospital_Radio_Data.csv?v=' + Date.now();

    async function start() {
        try {
            const response = await fetch(csvUrl);
            const text = await response.text();
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
            
            let tierA = []; 
            let tierC = [];

            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 5) continue;

                const artist = cols[0].replace(/"/g, "").trim();
                const title = cols[1].replace(/"/g, "").trim();
                const score = parseInt(cols[cols.length - 4]) || 0;

                if (score > 600) tierA.push({ artist, title }); 
                else tierC.push({ artist, title });
            }

            const dayNum = new Date().getDay();
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            document.getElementById('day-label').innerText = days[dayNum];

            let html = "";
            let artistHistory = []; // Keeps track of ALL artists used in this hour

            // We need 16 songs total
            for (let q = 0; q < 4; q++) {
                for (let s = 0; s < 4; s++) {
                    const time = `10:${(q * 15).toString().padStart(2, '0')}`;
                    let pool = (s === 0) ? tierA : tierC;
                    let type = (s === 0) ? "Gold" : "Classic";
                    
                    // Math + Aggressive Artist Separation
                    let baseIdx = (dayNum * 31 + q * 4 + s) % pool.length;
                    let selectedSong = null;

                    // Search through the pool to find an artist NOT in the history
                    for (let offset = 0; offset < pool.length; offset++) {
                        let candidate = pool[(baseIdx + offset) % pool.length];
                        if (!artistHistory.includes(candidate.artist)) {
                            selectedSong = candidate;
                            break;
                        }
                    }

                    // Emergency Fallback: If everyone in the pool has played (very small list), allow a repeat
                    if (!selectedSong) selectedSong = pool[baseIdx];

                    artistHistory.push(selectedSong.artist);

                    html += `
                        <div class="slot">
                            <span class="time">${time}</span>
                            <div class="song-details">
                                <span class="artist">${selectedSong.artist}</span>
                                <span class="title">${selectedSong.title}</span>
                            </div>
                            <span class="tag">${type}</span>
                        </div>`;
                }
            }
            document.getElementById('playlist').innerHTML = html;

        } catch (e) {
            document.getElementById('playlist').innerHTML = "⚠️ Database Sync Error.";
        }
    }
    start();
</script>
</body>
</html>
