<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Radio - All Time Greats</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; }
        .card { max-width: 600px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #004a99; color: white; padding: 30px 20px; text-align: center; }
        .slot { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #eee; }
        .num { width: 35px; font-weight: bold; color: #004a99; font-size: 1.1em; opacity: 0.6; }
        .details { flex-grow: 1; }
        .artist { font-weight: bold; color: #222; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
        .title { color: #555; font-size: 0.95em; }
        
        /* Tier Tags */
        .tag { font-size: 0.65em; font-weight: bold; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; margin-left: 10px; min-width: 90px; text-align: center; }
        .tier-a { background: #ffd700; color: #000; border: 1px solid #b8860b; } /* Power Gold */
        .tier-b { background: #e67e22; color: #fff; } /* Heavy */
        .tier-c { background: #e1f0ff; color: #004a99; } /* Medium */

        .footer { background: #f8f9fa; color: #555; padding: 20px; text-align: center; font-size: 0.85em; border-top: 1px solid #eee; line-height: 1.6; }
        .download-btn { 
            display: inline-block; margin-top: 15px; padding: 10px 20px; 
            background: #ffffff; color: #004a99; text-decoration: none; 
            border-radius: 6px; font-weight: bold; font-size: 0.85em;
            cursor: pointer; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: all 0.2s;
        }
        .download-btn:hover { background: #e1f0ff; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1 style="margin:0; font-size: 1.8em; letter-spacing: 2px;">ALL-TIME GREATS</h1>
        <button class="download-btn" onclick="downloadPlaylist()">📥 Download Playlist (.txt)</button>
    </div>
    
    <div id="main-list">Loading All-Time Greats...</div>

    <div class="footer">
        <strong>Developer:</strong> Tony Wilding<br>
        From the National Hospital Radio Request Charts (Top 40) since 2004, curated by <strong>Mark W Snowdon</strong>
    </div>
</div>

<script>
    const csvUrl = 'https://raw.githubusercontent.com/tonywilding33/ALLTIMEGREATS/main/Scored_Hospital_Radio_Data.csv?nocache=' + Date.now();
    let currentPlaylistData = [];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    async function start() {
        try {
            const res = await fetch(csvUrl);
            const text = await res.text();
            const rows = text.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
            
            let allSongs = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { 
                    artist: c[0].replace(/"/g, "").trim(), 
                    title: c[1].replace(/"/g, "").trim(),
                    score: parseInt(c[24]) || 0,       // Col Y
                    peak: parseInt(c[27]) || 99,      // Col AB
                    gender: (c[28] || "M").trim().toUpperCase(), // Col AC
                    year: parseInt(c[29]) || 0         // Col AD
                };
            });

            // TIER DEFINITIONS based on new data
            let tierA = allSongs.filter(s => s.peak <= 5 && s.score > 500); 
            let tierB = allSongs.filter(s => (s.peak > 5 && s.peak <= 20) || (s.score >= 250 && s.score <= 500));
            let tierC = allSongs.filter(s => !tierA.includes(s) && !tierB.includes(s));

            shuffleArray(tierA);
            shuffleArray(tierB);
            shuffleArray(tierC);

            let artistHistory = [];
            let genderHistory = [];
            let lastEraWasModern = false;
            let html = "";
            currentPlaylistData = []; 

            for (let i = 0; i < 16; i++) {
                const countNum = (i + 1).toString().padStart(2, '0');
                
                let pool;
                let tierLabel;
                let tierClass;

                // Rotation pattern for pacing
                if (i % 4 === 0) {
                    pool = tierA; tierLabel = "Power Gold"; tierClass = "tier-a";
                } else if (i % 2 === 0) {
                    pool = tierB; tierLabel = "Heavy"; tierClass = "tier-b";
                } else {
                    pool = tierC; tierLabel = "Medium"; tierClass = "tier-c";
                }
                
                let pick = null;
                let pickIndex = -1;

                for (let j = 0; j < pool.length; j++) {
                    const s = pool[j];
                    
                    const artistRepeat = artistHistory.includes(s.artist);
                    const genderOverload = genderHistory.length >= 2 && genderHistory.every(g => g === s.gender);
                    const isModern = s.year >= 1990;
                    const eraShift = (isModern !== lastEraWasModern);

                    if (!artistRepeat && !genderOverload) {
                        pick = s;
                        pickIndex = j;
                        if (eraShift) break; 
                    }
                }

                if (!pick) { pickIndex = 0; pick = pool[pickIndex]; }

                pool.splice(pickIndex, 1);

                artistHistory.push(pick.artist);
                if (artistHistory.length > 5) artistHistory.shift();
                genderHistory.push(pick.gender);
                if (genderHistory.length > 2) genderHistory.shift();
                lastEraWasModern = (pick.year >= 1990);

                currentPlaylistData.push({
                    id: countNum,
                    artist: pick.artist,
                    title: pick.title,
                    tier: tierLabel
                });

                html += `<div class="slot">
                    <span class="num">${countNum}</span>
                    <div class="details">
                        <span class="artist">${pick.artist}</span>
                        <span class="title">${pick.title} (${pick.year})</span>
                    </div>
                    <span class="tag ${tierClass}">${tierLabel}</span>
                </div>`;
            }
            document.getElementById('main-list').innerHTML = html;
        } catch (e) {
            console.error(e);
            document.getElementById('main-list').innerHTML = "Error syncing with new data structure.";
        }
    }

    function downloadPlaylist() {
        if (currentPlaylistData.length === 0) return;
        let content = `ALL-TIME GREATS PLAYLIST\r\n`;
        content += `-------------------------------------------\r\n`;
        currentPlaylistData.forEach(song => {
            content += `${song.id}. ${song.artist.toUpperCase()} - ${song.title} [${song.tier}]\r\n`;
        });
        content += `-------------------------------------------\r\n`;
        content += `National Hospital Radio Charts - Curated by Mark W Snowdon\r\n`;
        content += `System Developer: Tony Wilding`;
        
        const blob = new Blob([content], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `All_Time_Greats_Playlist.txt`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
    }

    start();
</script>
</body>
</html>
